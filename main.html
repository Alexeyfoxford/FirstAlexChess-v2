<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FirstAlex</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="form-container" id="authForm">
            <h1 class="form-title">Вход в систему</h1>
            
            <div class="message" id="message"></div>
            
            <div class="input-group">
                <input type="text" id="username" placeholder="Имя пользователя" required>
            </div>
            
            <div class="input-group">
                <input type="password" id="password" placeholder="Пароль" required>
                <button type="button" class="password-toggle" id="togglePassword">
                    <i class="fas fa-eye"></i>
                </button>
            </div>
            
            <button class="btn" id="loginBtn">Войти</button>
            
            <div class="form-footer">
                <p>Нет аккаунта? <a href="#" id="switchToRegister">Зарегистрироваться</a></p>
            </div>
        </div>

        <div class="form-container" id="registerForm" style="display: none;">
            <h1 class="form-title">Регистрация</h1>
            
            <div class="message" id="regMessage"></div>
            
            <div class="input-group">
                <input type="text" id="regUsername" placeholder="Имя пользователя" required>
            </div>
            
            <div class="input-group">
                <input type="password" id="regPassword" placeholder="Пароль" required>
                <button type="button" class="password-toggle" id="toggleRegPassword">
                    <i class="fas fa-eye"></i>
                </button>
            </div>
            
            <div class="input-group">
                <input type="password" id="confirmPassword" placeholder="Подтвердите пароль" required>
            </div>
            
            <button class="btn" id="registerBtn">Зарегистрироваться</button>
            
            <div class="form-footer">
                <p>Уже есть аккаунт? <a href="#" id="switchToLogin">Войти</a></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
