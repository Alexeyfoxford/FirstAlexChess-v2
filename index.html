<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome!</title>
    <link rel="stylesheet" href="welcome.css">
</head>
<body>
    <!-- Слои для анимированного фона -->
    <div class="bg"></div>
    <div class="bg bg2"></div>
    <div class="bg bg3"></div>

    <!-- Основной контент -->
    <div class="content">
        <h1>Привет! Прочитайте <a href="https://docs.google.com/document/d/1isUYp_LKyBWqC9N8gBCVkIHwElr4axRmVH7kN1JgzJ0/edit?usp=sharing" target="_blank">правила</a>.</h1>
        
        <!-- Блок согласия -->
        <div class="agreement">
            <label class="check-label">
                <input type="checkbox" id="agree-check"> 
                <span>Я согласен с правилами</span>
            </label>
        </div>

        <!-- Кнопка-ссылка -->
        <a href="main.html" id="link-wrap" style="pointer-events: none;">
            <button id="submit-btn" disabled>Продолжить</button>
        </a>
    </div>

    <script>
        const checkbox = document.getElementById('agree-check');
        const btn = document.getElementById('submit-btn');
        const link = document.getElementById('link-wrap');

        checkbox.addEventListener('change', function() {
            if (this.checked) {
                btn.disabled = false;
                link.style.pointerEvents = "auto"; // Разрешаем переход по ссылке
                btn.classList.add('active');
            } else {
                btn.disabled = true;
                link.style.pointerEvents = "none"; // Запрещаем переход
                btn.classList.remove('active');
            }
        });
    </script>
</body>
</html>
